<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>24/7 Agent to assist you!</title>
    <style>
      :root{ --bg:#f4f7fb; --user:#0b93f6; --bot:#e5e5ea; --accent:#1f6feb }
      body{ font-family:Inter,Segoe UI,Arial,Helvetica,sans-serif; background:var(--bg); margin:0; padding:0 }
      .container{ max-width:820px; margin:24px auto; background:#fff; border-radius:8px; box-shadow:0 6px 18px rgba(20,20,40,0.06); overflow:hidden }
      header{ background:var(--accent); color:#fff; padding:18px 20px }
      header h1{ margin:0; font-size:18px }
      .chat{ height:520px; display:flex; flex-direction:column }
      .messages{ flex:1; padding:18px; overflow:auto; background:linear-gradient(180deg,#fff, #fbfdff) }
      .composer{ display:flex; padding:12px; gap:8px; border-top:1px solid #eee }
      .composer input{ flex:1; padding:10px 12px; border-radius:6px; border:1px solid #ddd }
      .composer button{ background:var(--accent); color:#fff; border:none; padding:10px 14px; border-radius:6px }
      .msg{ display:flex; margin-bottom:12px }
      .msg.user{ justify-content:flex-end }
      .bubble{ max-width:68%; padding:10px 14px; border-radius:14px; line-height:1.4 }
      .bubble.user{ background:var(--user); color:#fff; border-bottom-right-radius:4px }
      .bubble.bot{ background:var(--bot); color:#000; border-bottom-left-radius:4px }
      .meta{ font-size:12px; color:#666; margin-bottom:8px }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>24/7 Agent to assist you!</h1>
      </header>
      <div class="chat">
        <div id="messages" class="messages">
          <div class="msg bot"><div class="bubble bot">Hello — I'm a read-only assistant. Ask about the project or search the FAQ.</div></div>
        </div>
        <div class="composer">
          <input id="input" type="text" placeholder="Type your question (e.g. booking, rooms, technologies)" />
          <button id="send">Send</button>
        </div>
      </div>
    </div>

    <script>
      const msgs = document.getElementById('messages');
      const input = document.getElementById('input');
      const send = document.getElementById('send');

      function appendMessage(text, who='bot'){
        const wrapper = document.createElement('div');
        wrapper.className = 'msg ' + (who==='user' ? 'user' : 'bot');
        const bubble = document.createElement('div');
        bubble.className = 'bubble ' + (who==='user' ? 'user' : 'bot');
        bubble.innerHTML = text;
        wrapper.appendChild(bubble);
        msgs.appendChild(wrapper);
        msgs.scrollTop = msgs.scrollHeight;
      }

      async function queryChat(q){
        const url = q ? `/chat?q=${encodeURIComponent(q)}` : '/chat';
        try{
          const res = await fetch(url);
          if (!res.ok) return { error: true, text: 'Chat request failed' };
          const data = await res.json();
          return { error:false, data };
        } catch(e){
          return { error:true, text: e.message };
        }
      }

      async function handleSend(){
        const text = input.value.trim();
        if(!text) return;
        appendMessage(text, 'user');
        input.value = '';
        send.disabled = true;

        const result = await queryChat(text);
        if (result.error){
          appendMessage('Sorry — could not reach the assistant: ' + (result.text||''));
        } else {
          const d = result.data;
          if (d.source === 'faq' && d.results && d.results.length){
            const items = d.results.slice(0,3).map(r => `<strong>${escapeHtml(r.q)}</strong><div>${escapeHtml(r.a)}</div>`).join('<hr>');
            appendMessage(`<div>Found ${d.count} FAQ result(s):</div>${items}`);
          } else if (d.source === 'llm' || d.source === 'rule'){
            appendMessage(escapeHtml(d.reply || 'Sorry, no reply')); 
+            if (d.source === 'rule' && d.reply && d.reply.startsWith('I can chat briefly.')) {
+              appendMessage('If you want, ask anything else or say "Hi" to start a casual chat.');
+            }
          } else if (d.source === 'error'){
            appendMessage('Sorry — the assistant could not process your request.');
          } else {
            showFallbackPrompt();
          }
        }
        send.disabled = false;
      }

      function showFallbackPrompt(){
        const fallback = "I will get a CSO to assist you on this matter. Please expect a call-back in 3 working days.";
        appendMessage(fallback);

        // Create prompt buttons
        const container = document.createElement('div');
        container.style.marginTop = '8px';
        const yes = document.createElement('button');
        yes.textContent = 'Y';
        yes.style.marginRight = '8px';
        const no = document.createElement('button');
        no.textContent = 'N';

        // Wrap in a small bubble for visual grouping
        const promptWrapper = document.createElement('div');
        promptWrapper.className = 'msg bot';
        const promptBubble = document.createElement('div');
        promptBubble.className = 'bubble bot';
        promptBubble.appendChild(container);
        container.appendChild(document.createTextNode('Would you like to continue chat (Y/N)? '));
        container.appendChild(yes);
        container.appendChild(no);

        promptWrapper.appendChild(promptBubble);
        msgs.appendChild(promptWrapper);
        msgs.scrollTop = msgs.scrollHeight;

        // Handlers
        yes.addEventListener('click', ()=>{
          // remove prompt
          promptWrapper.remove();
          appendMessage('Okay — how can I help you further?');
          input.disabled = false;
          send.disabled = false;
          input.focus();
        });

        no.addEventListener('click', ()=>{
          promptWrapper.remove();
          appendMessage('Have a nice day!');
          // disable further input
          input.disabled = true;
          send.disabled = true;
        });
      }

      function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;'); }

      send.addEventListener('click', handleSend);
      input.addEventListener('keydown', (e)=>{ if (e.key==='Enter') handleSend(); });
    </script>
  </body>
</html>
